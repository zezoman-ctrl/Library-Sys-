<!DOCTYPE html>
<html>
<head>
    <title>Add New Book</title>
    <link rel="stylesheet" href="Style/style.css">
    <style>
        body { 
            background: #000; 
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 210, 255, 0.2);
            width: 400px;
            z-index: 10;
        }
        h2 { 
            color: #fff; 
            text-align: center; 
            margin-bottom: 30px; 
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }
        label { color: #00d2ff; font-size: 13px; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px;
            color: #fff;
            margin-bottom: 20px;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #00d2ff;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }
        button[type="submit"] {
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        button[type="submit"]:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4); }
        button[type="reset"] {
            background: transparent;
            color: #ff4b2b;
            border: 1px solid #ff4b2b;
            padding: 10px;
            width: 100%;
            margin-top: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="form-container">
        <h2>NEW BOOK</h2>
        <form action="Manage Books.html" method="GET">
            <label for="id">Book ID</label>
            <input type="text" id="id" name="ID" required>
            
            <label for="bookName">Book Name</label>
            <input type="text" id="bookName" name="bookName" required>
            
            <label for="author">Author</label>
            <input type="text" id="author" name="author" required>
            
            <label for="category">Category</label>
            <input type="text" id="category" name="category">
            
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3"></textarea>
            
            <button type="submit">Add to Library</button>
            <button type="reset">Clear Form</button>
        </form>
    </div>
    <script src="AddorEdit.js"></script>
    <script src="Javascript/star.js"></script>
</body>
</html>
