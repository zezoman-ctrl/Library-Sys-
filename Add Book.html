<!DOCTYPE html>
<html>
<head>
    <title>Add New Book</title>
    <link rel="stylesheet" href="Style/style.css">
</head>

<body>
    <h2>Book Details:</h3>
    <form action="Manage Books.html" method="GET">
        
        <label for="id">ID:</label><br>
        <input type="text" id="id" name="ID" required><br><br>

        <label for="bookName">Book Name:</label><br>
        <input type="text" id="bookName" name="bookName" required><br><br>

        <label for="author">Author:</label><br>
        <input type="text" id="author" name="author" required><br><br>

        <label for="category">Category:</label><br>
        <input type="text" id="category" name="category"><br><br>

        <label for="description">Description:</label><br>
        <textarea id="description" name="description" rows="4" cols="40"></textarea><br><br>

        <button type="submit">Add Book</button>
        <button type="reset">Clear Form</button>

    </form> 
    <script src="AddorEdit.js"></script>
    <script src="Javascript/star.js"></script>

</body>
</html>
