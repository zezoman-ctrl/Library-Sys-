{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <!-- ربط ملفات الـ CSS بنظام static -->
    <link rel="stylesheet" href="{% static 'style/profile.css' %}">
    <link rel="stylesheet" href="{% static 'style/style.css' %}">
</head>
<body>

    <nav></nav>
    <div class="stars" id="stars"></div>

    <div class="profile-container">
        <h2>My Profile</h2>
        
        <div class="avatar">
            <!-- هنا ممكن مستقبلاً تعرض أول حرف من اسم المستخدم الفعلي باستخدام {{ user.username|slice:":1" }} -->
            <span id="initials"></span>
        </div>

        <!-- تعديل الـ Form لإرسال البيانات للـ View المختصة -->
        <form id="profile-form" action="{% url 'profile_update' %}" method="POST">
            {% csrf_token %} <!-- حماية الـ POST -->

            <label for="profile-name">Full Name</label>
            <!-- استخدام {{ user.get_full_name }} لعرض اسم المستخدم الحالي من ديجانجو -->
            <input type="text" id="profile-name" name="full_name" value="{{ user.get_full_name }}" required>

            <label for="profile-email">Email Address</label>
            <!-- عرض إيميل المستخدم الحالي -->
            <input type="email" id="profile-email" name="email" value="{{ user.email }}" readonly>

            <label for="current-password">Current Password (Required to save changes)</label>
            <input type="password" id="current-password" name="current_password" required placeholder="Verify current password">

            <label for="profile-password">New Password (Leave blank to keep current)</label>
            <input type="password" id="profile-password" name="new_password" placeholder="New password">

            <button type="submit">Save Changes</button>
        </form>
    </div>

    <!-- ربط ملفات الـ JavaScript بنظام static -->
    <script src="{% static 'javascript/navbar.js' %}"></script>
    <script src="{% static 'javascript/star.js' %}"></script>
    <script src="{% static 'javascript/profile.js' %}"></script>

</body>
</html>
