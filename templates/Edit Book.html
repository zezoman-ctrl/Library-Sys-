{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Book - StarLibrary</title>
    <link rel="stylesheet" href="{% static 'style/style.css' %}?v=2">
    <link rel="stylesheet" href="{% static 'style/auth.css' %}?v=2">
</head>
<body>
    <div id="toastBox">
        {% if messages %}
            {% for message in messages %}
                <div class="toast {% if message.tags == 'error' %}error{% endif %}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    </div>
    <div class="stars" id="stars"></div>

    <div class="form-container">
        <h2>EDIT BOOK</h2>
        
        <form action="{% url 'edit_book' book.id %}" method="POST">
            {% csrf_token %}
            
            <label>Book ID (Read Only)</label>
            <input type="text" value="{{ book.custom_id }}" readonly style="opacity: 0.5;">
            
            <label>Title</label>
            <input type="text" name="bookName" value="{{ book.title }}" required>
            
            <label>Author</label>
            <input type="text" name="author" value="{{ book.author }}" required>
            
            <label>Category</label>
            <select name="category" required style="width: 100%; padding: 12px; background: rgba(0,0,0,0.3); color: white; border-radius: 8px;">
                <option value="Fantasy" {% if book.category == "Fantasy" %}selected{% endif %}>Fantasy</option>
                <option value="History" {% if book.category == "History" %}selected{% endif %}>History</option>
                <option value="Science" {% if book.category == "Science" %}selected{% endif %}>Science</option>
                <option value="Programming" {% if book.category == "Programming" %}selected{% endif %}>Programming</option>
            </select>

            <label style="margin-top: 20px;">Description</label>
            <textarea name="description" rows="4" style="width: 100%; background: rgba(0,0,0,0.3); color: white; border-radius: 8px;">{{ book.description }}</textarea>
            
            <button type="submit" style="margin-top: 20px;">Update Library</button>
            <a href="{% url 'manage_books' %}" style="display: block; text-align: center; color: #aaa; margin-top: 15px; text-decoration: none;">Cancel</a>
        </form>
    </div>

    <script src="{% static 'javascript/star.js' %}"></script>
</body>
</html>
