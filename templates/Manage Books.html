{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Books - StarLibrary</title>
    <!-- ربط الـ CSS بنظام static -->
    <link rel="stylesheet" href="{% static 'style/style.css' %}">
    <link rel="stylesheet" href="{% static 'style/manage-books.css' %}">
</head>
<body>
    <div class="stars" id="stars"></div>

    <nav>
        <!-- تعديل الروابط لتستخدم أسماء الـ URLs في ديجانجو -->
        <a href="{% url 'welcome' %}">Home</a>
        <a href="{% url 'add_book_view' %}">Add Book</a>
        <a href="{% url 'login' %}">Logout</a>
    </nav>

    <main>
        <h2 class="page-title">MANAGE BOOKS</h2>
        <p class="books-count" id="booksCount"></p>
        <div class="books-grid" id="booksGrid"></div>
    </main>

    <!-- ربط ملفات الـ JavaScript بنظام static -->
    <script src="{% static 'javascript/AddorEdit.js' %}"></script>
    <script src="{% static 'javascript/manage-books.js' %}"></script>
    <script src="{% static 'javascript/star.js' %}"></script>
</body>
</html>
