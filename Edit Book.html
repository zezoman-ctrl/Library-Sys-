<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Book</title>
    <link rel="stylesheet" href="Style/style.css">
    <style>
        body { background: #000; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .form-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 15px rgba(160, 32, 240, 0.2);
            width: 400px;
        }
        h2 { color: #fff; text-align: center; margin-bottom: 30px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(160, 32, 240, 0.5); }
        label { color: #a020f0; font-size: 13px; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px;
            color: #fff;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        input[readonly] { background: rgba(0,0,0,0.3); color: #666; border-style: dashed; }
        button[type="submit"] {
            background: linear-gradient(45deg, #a020f0, #6a11cb);
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button[type="submit"]:hover { box-shadow: 0 0 20px rgba(160, 32, 240, 0.5); transform: scale(1.02); }
        .cancel-btn { color: #aaa; text-decoration: none; display: block; text-align: center; margin-top: 15px; font-size: 13px; transition: 0.3s; }
        .cancel-btn:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="form-container">
        <h2>EDIT BOOK</h2>
        <form action="Manage Books.html">
            <label>System ID</label>
            <input type="text" name="ID" value="001" readonly>
            
            <label>Title</label>
            <input type="text" name="bookName" value="Jane Eyre">
            
            <label>Author</label>
            <input type="text" name="author" value="Charlotte Brontë">
            
            <label>Category</label>
            <input type="text" name="category" value="Romance">
            
            <label>Description</label>
            <textarea name="description" rows="3">Gothic romance novel.</textarea>
            
            <button type="submit">Update Library</button>
            <a href="Manage Books.html" class="cancel-btn">Discard Changes</a>
        </form>
    </div>
    <script src="AddorEdit.js"></script>
    <script src="Javascript/star.js"></script>
</body>
</html>
