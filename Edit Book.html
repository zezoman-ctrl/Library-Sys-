<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Book</title>
    <link rel="stylesheet" href="Style/style.css">
    <link rel="stylesheet" href="Style/edit-book.css">
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="form-container">
        <h2>EDIT BOOK</h2>
        <form action="Manage Books.html">
            <label>System ID</label>
            <input type="text" name="ID" value="001" readonly>
            
            <label>Title</label>
            <input type="text" name="bookName" value="Jane Eyre">
            
            <label>Author</label>
            <input type="text" name="author" value="Charlotte Brontë">
            
            <label>Category</label>
            <div class="category-wrapper">
                <select id="category" name="category"></select>
                <button type="button" class="add-cat-btn" onclick="toggleNewCat()">+</button>
            </div>
            <div id="newCatBox">
                <input type="text" id="newCatInput" placeholder="Type new category...">
                <button type="button" class="save-cat-btn" onclick="saveNewCategory()">Save Category</button>
            </div>
            <script>
                var CAT_KEY = "library_categories";
                var DEFAULT_CATS = ["Fantasy","History","Programming","Romance","Science","Self Development"];

                function loadCategories() {
                    var stored = localStorage.getItem(CAT_KEY);
                    return stored ? JSON.parse(stored) : DEFAULT_CATS;
                }

                function saveCategories(cats) {
                    localStorage.setItem(CAT_KEY, JSON.stringify(cats));
                }

                function populateSelect(selectedValue) {
                    var sel = document.getElementById("category");
                    var cats = loadCategories();
                    sel.innerHTML = "";
                    cats.forEach(function(c) {
                        var opt = document.createElement("option");
                        opt.value = c;
                        opt.textContent = c;
                        opt.style.background = "#111";
                        opt.style.color = "#fff";
                        if (c === selectedValue) opt.selected = true;
                        sel.appendChild(opt);
                    });
                }

                function toggleNewCat() {
                    var box = document.getElementById("newCatBox");
                    box.style.display = box.style.display === "none" || box.style.display === "" ? "flex" : "none";
                    if (box.style.display === "flex") document.getElementById("newCatInput").focus();
                }

                function saveNewCategory() {
                    var input = document.getElementById("newCatInput");
                    var name = input.value.trim();
                    if (!name) { input.focus(); return; }
                    var cats = loadCategories();
                    if (cats.indexOf(name) !== -1) { alert("Category already exists."); return; }
                    cats.push(name);
                    cats.sort();
                    saveCategories(cats);
                    populateSelect(name);
                    input.value = "";
                    document.getElementById("newCatBox").style.display = "none";
                }

                document.addEventListener("DOMContentLoaded", function() {
                    document.getElementById("newCatInput").addEventListener("keydown", function(e) {
                        if (e.key === "Enter") { e.preventDefault(); saveNewCategory(); }
                    });
                });

                var urlParams = new URLSearchParams(window.location.search);
                populateSelect(urlParams.get("category") || "");
            </script>
            
            <label>Description</label>
            <textarea name="description" rows="3">Gothic romance novel.</textarea>
            
            <button type="submit">Update Library</button>
            <a href="Manage Books.html" class="cancel-btn">Discard Changes</a>
        </form>
    </div>
    <script src="AddorEdit.js"></script>
    <script src="Javascript/star.js"></script>
</body>
</html>
