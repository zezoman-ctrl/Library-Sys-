<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Books — Online Library</title>
    <link rel="icon" type="image/png" href="style/favicon-32x32.png">
    <link rel="stylesheet" href="style/style2.css" />
    <link rel="stylesheet" href="style/style.css" />
</head>
<body>

    <nav></nav>

    <main class="page">

        <div class="page-header">
            <h1>Library Catalog</h1>
            <p>Browse and search our complete book collection.</p>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-num" id="totalCount">0</div>
                <div class="stat-label">Total Books</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="availableCount">0</div>
                <div class="stat-label">Available</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="borrowedCount">0</div>
                <div class="stat-label">Borrowed</div>
            </div>
        </div>

        <div class="toolbar">
            <div class="search-wrap">
                <span class="search-icon">&#128269;</span>
                <input type="text" id="searchInput" placeholder="Search by title or author…" autocomplete="off" />
            </div>
            <select class="filter-select" id="categoryFilter">
                <option value="">All Categories</option>
            </select>
            <select class="filter-select" id="statusFilter">
                <option value="">All Status</option>
                <option value="available">Available</option>
                <option value="borrowed">Borrowed</option>
            </select>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Book Name</th>
                        <th>Author</th>
                        <th>Category</th>
                        <th>Description</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="booksTableBody"></tbody>
            </table>

            <div id="emptyState" class="empty-state" style="display:none;">
                <div class="empty-icon">&#128214;</div>
                <p>No books found. Add books from the Manage Books page.</p>
            </div>
        </div>

    </main>

    <div id="toastBox"></div>

    <script src="javascript/navbar.js"></script>
    <script src="javascript/search.js"></script>
    <script src="javascript/star.js"></script>
    <script src="javascript/books.js"></script>
</body>
</html>
